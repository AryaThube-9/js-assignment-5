<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let marks = prompt("Enter Marks")

        if (marks >= 50) {
            if (marks >= 75) {
                if (marks >= 90) {
                    document.write("Grade A")
                }
                else {
                    document.write("Grade B")
                }
            }
            else {
                document.write("Grade C")
            }
        }
        else {
            document.write("Fail")
        }

    </script>
</body>

</html>
